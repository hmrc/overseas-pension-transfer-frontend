rules = [
  OrganizeImports
]

RemoveUnused {
  imports = true
  privates = false
  locals = false
  patternvars = false
  params = false
}

OrganizeImports {
    groupedImports = Explode
    importsOrder = Keep
    importSelectorsOrder = Keep
    coalesceToWildcardImportThreshold = 3
    expandRelative = true
    removeUnused = true
    groups = [
      "*"
      "scala."
      "re:javax?\\."
    ]
}